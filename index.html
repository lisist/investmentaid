<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Wiki Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fafbfc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        .search-container {
            width: 100%;
            max-width: 650px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .search-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 28px;
            color: #24292e;
            letter-spacing: -0.5px;
        }
        .search-input {
            box-sizing: border-box; /* 핵심 해결 코드: 패딩과 테두리를 너비에 포함 */
            width: 100%;
            padding: 16px 22px;
            font-size: 18px;
            border: 1px solid #e1e4e8;
            border-radius: 10px;
            outline: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .search-input:focus {
            border-color: #0366d6;
            box-shadow: 0 4px 24px rgba(3, 102, 214, 0.15);
        }
        .results-list {
            list-style-type: none;
            padding: 0;
            margin-top: 15px;
            max-height: 350px;
            overflow-y: auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            text-align: left;
            border: 1px solid #e1e4e8;
            box-sizing: border-box; /* 결과창도 삐져나가지 않도록 추가 */
        }
        .results-list:empty {
            border: none;
            box-shadow: none;
        }
        .results-list li {
            border-bottom: 1px solid #eaecef;
        }
        .results-list li:last-child {
            border-bottom: none;
        }
        .results-list a {
            display: block;
            padding: 14px 20px;
            text-decoration: none;
            color: #0366d6;
            font-weight: 600;
            font-size: 16px;
            transition: background-color 0.2s;
        }
        .results-list a:hover {
            background-color: #f6f8fa;
            color: #0056b3;
        }

        /* 📱 모바일 화면 최적화 */
        @media (max-width: 600px) {
            .search-container {
                padding: 15px;
            }
            .search-title {
                font-size: 22px;
                margin-bottom: 20px;
            }
            .search-input {
                font-size: 16px;
                padding: 14px 18px;
            }
            .results-list a {
                font-size: 15px;
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="search-container">
        <div class="search-title">Investment AI-ed</div>
        <input type="text" id="searchInput" placeholder="종목명 또는 리서치 키워드 검색..." class="search-input" autofocus>
        <ul id="searchResults" class="results-list"></ul>
    </div>

    <script src="search_index.js"></script>
    <script>
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase().trim();
            const resultsContainer = document.getElementById('searchResults');
            resultsContainer.innerHTML = ''; 

            if (!keyword) return;

            const filtered = searchData.filter(item => 
                item.title.toLowerCase().includes(keyword)
            );

            filtered.forEach(item => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                
                a.href = item.url; 
                a.textContent = item.title;
                
                li.appendChild(a);
                resultsContainer.appendChild(li);
            });
        });
    </script>
</body>
</html>
