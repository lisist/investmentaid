<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment AIed</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fafbfc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        .search-container {
            width: 100%;
            max-width: 650px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .search-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 28px;
            color: #24292e;
            letter-spacing: -0.5px;
        }
        .search-input {
            box-sizing: border-box; 
            width: 100%;
            padding: 16px 22px;
            font-size: 18px;
            border: 1px solid #e1e4e8;
            border-radius: 10px;
            outline: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .search-input:focus {
            border-color: #0366d6;
            box-shadow: 0 4px 24px rgba(3, 102, 214, 0.15);
        }
        .results-list {
            list-style-type: none;
            padding: 0;
            margin-top: 15px;
            max-height: 350px;
            overflow-y: auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            text-align: left;
            border: 1px solid #e1e4e8;
            box-sizing: border-box; 
        }
        .results-list:empty {
            border: none;
            box-shadow: none;
        }
        .results-list li {
            border-bottom: 1px solid #eaecef;
        }
        .results-list li:last-child {
            border-bottom: none;
        }
        .results-list a {
            display: block;
            padding: 14px 20px;
            text-decoration: none;
            color: #0366d6;
            font-weight: 600;
            font-size: 16px;
            transition: background-color 0.2s;
        }
        .results-list a:hover {
            background-color: #f6f8fa;
            color: #0056b3;
        }
        .results-list li.active {
            background-color: #f1f8ff;
            border-left: 4px solid #0366d6;
        }
        .results-list li.active a {
            color: #0056b3;
            padding-left: 16px; 
        }

        /* 💡 추가: 하단 종목 카운터 디자인 */
        .total-count-display {
            margin-top: 25px;
            font-size: 14px;
            color: #586069;
            font-weight: 500;
        }
        .total-count-display span {
            color: #0366d6;
            font-weight: 700;
        }

        @media (max-width: 600px) {
            .search-container { padding: 15px; }
            .search-title { font-size: 22px; margin-bottom: 20px; }
            .search-input { font-size: 16px; padding: 14px 18px; }
            .results-list a { font-size: 15px; padding: 12px 15px; }
        }
    </style>
</head>
<body>
    <div class="search-container">
        <div class="search-title">Investment AI-ed</div>
        <input type="text" id="searchInput" placeholder="종목명 검색..." class="search-input" autofocus autocomplete="off">
        <ul id="searchResults" class="results-list"></ul>
        
        <div id="totalCount" class="total-count-display"></div>
    </div>

    <script src="search_index.js"></script>
    <script>
        // 💡 추가: 페이지가 열리자마자 searchData 배열의 길이(종목 수)를 세어서 화면에 출력
        if (typeof searchData !== 'undefined') {
            document.getElementById('totalCount').innerHTML = `현재 총 <span>${searchData.length}</span>개의 리서치 노트를 커버하고 있습니다.`;
        }

        let currentFocus = -1; 

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase().trim();
            const resultsContainer = document.getElementById('searchResults');
            resultsContainer.innerHTML = ''; 
            currentFocus = -1; 

            if (!keyword) return;

            const filtered = searchData.filter(item => 
                item.title.toLowerCase().includes(keyword)
            );

            filtered.forEach((item, index) => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                
                a.href = item.url; 
                a.textContent = item.title;
                
                li.appendChild(a);
               resultsContainer.appendChild(li);

                li.addEventListener('mouseenter', () => {
                    currentFocus = index;
                    addActive(resultsContainer.getElementsByTagName('li'));
                });
            });
        });

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.isComposing || e.keyCode === 229) {
                if (e.key === "Enter") return;
            }

            const resultsContainer = document.getElementById('searchResults');
            const items = resultsContainer.getElementsByTagName('li');
            
            if (e.key === "ArrowDown" || e.keyCode === 40) {
                currentFocus++;
                addActive(items);
                e.preventDefault(); 
            } else if (e.key === "ArrowUp" || e.keyCode === 38) {
                currentFocus--;
                addActive(items);
                e.preventDefault();
            } else if (e.key === "Enter" || e.keyCode === 13) {
                e.preventDefault();
                if (currentFocus > -1 && items[currentFocus]) {
                    window.location.href = items[currentFocus].querySelector('a').href;
                }
            }
        });

        function addActive(items) {
            if (!items || items.length === 0) return false;
            removeActive(items);
            
            if (currentFocus >= items.length) currentFocus = 0;
            if (currentFocus < 0) currentFocus = items.length - 1;
            
            items[currentFocus].classList.add("active");
            items[currentFocus].scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        function removeActive(items) {
            for (let i = 0; i < items.length; i++) {
                items[i].classList.remove("active");
            }
        }
    </script>
</body>
</html>
